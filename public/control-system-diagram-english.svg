<svg xmlns="http://www.w3.org/2000/svg" width="980" height="356" viewBox="0 0 980 356">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <style>
      .line { stroke: #000; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .wire { stroke: #000; stroke-width: 1.2; fill: none; }
      .box { fill: #fff; stroke: #000; stroke-width: 1.2; }
      .label { font-family: "Times New Roman", Times, serif; font-size: 24px; fill: #000; }
      .math { font-family: "Times New Roman", Times, serif; font-style: italic; font-size: 24px; fill: #000; }
      .small { font-size: 18px; }
      .boxtext { font-family: "Times New Roman", Times, serif; font-size: 23px; fill: #000; text-anchor: middle; }
      .sign { font-family: "Times New Roman", Times, serif; font-size: 28px; fill: #000; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="980" height="356" fill="#fff"/>

  <!-- Input and first summing junction -->
  <text class="math" x="55" y="30">θ<tspan class="small" baseline-shift="sub">d</tspan></text>
  <line class="line" x1="48" y1="45" x2="104" y2="45"/>
  <circle cx="124" cy="45" r="20" fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text class="sign" x="124" y="45">+</text>
  <text class="sign" x="139" y="71">−</text>
  <text class="math" x="151" y="31">e<tspan class="small" baseline-shift="sub">θ</tspan></text>
  <line class="line" x1="144" y1="45" x2="198" y2="45"/>

  <!-- Position controller -->
  <rect class="box" x="199" y="7" width="152" height="76"/>
  <text class="boxtext" x="275" y="36">Position</text>
  <text class="boxtext" x="275" y="65">controller</text>
  <text class="math" x="356" y="30">ω<tspan class="small" baseline-shift="sub">d</tspan></text>
  <line class="line" x1="351" y1="45" x2="406" y2="45"/>

  <!-- Second summing junction -->
  <circle cx="426" cy="45" r="20" fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text class="sign" x="426" y="45">+</text>
  <text class="sign" x="441" y="71">−</text>
  <text class="math" x="451" y="31">e<tspan class="small" baseline-shift="sub">ω</tspan></text>
  <line class="line" x1="446" y1="45" x2="501" y2="45"/>

  <!-- Speed controller -->
  <rect class="box" x="502" y="7" width="151" height="76"/>
  <text class="boxtext" x="577.5" y="36">Speed</text>
  <text class="boxtext" x="577.5" y="65">controller</text>
  <text class="math" x="657" y="31">V<tspan class="small" baseline-shift="sub">m</tspan></text>
  <line class="line" x1="653" y1="45" x2="708" y2="45"/>

  <!-- Plant -->
  <rect class="box" x="709" y="7" width="151" height="76"/>
  <text class="boxtext" x="784.5" y="36">Motor, gear and</text>
  <text class="boxtext" x="784.5" y="65">transmission</text>
  <line class="wire" x1="860" y1="26" x2="936" y2="26"/>
  <line class="wire" x1="860" y1="63" x2="936" y2="63"/>
  <line class="line" x1="936" y1="26" x2="976" y2="26"/>
  <line class="line" x1="936" y1="63" x2="976" y2="63"/>
  <line class="wire" x1="936" y1="26" x2="936" y2="309"/>
  <text class="math" x="873" y="21">θ</text>
  <text class="math" x="873" y="58">ω</text>

  <!-- Feedback: speed sensor -->
  <rect class="box" x="709" y="158" width="151" height="76"/>
  <text class="boxtext" x="784.5" y="190">Speed</text>
  <text class="boxtext" x="784.5" y="219">sensor</text>
  <line class="wire" x1="936" y1="63" x2="916" y2="63"/>
  <line class="wire" x1="916" y1="63" x2="916" y2="196"/>
  <line class="line" x1="916" y1="196" x2="860" y2="196"/>
  <line class="wire" x1="709" y1="196" x2="426" y2="196"/>
  <line class="line" x1="426" y1="196" x2="426" y2="65"/>
  <text class="math" x="433" y="101">ω<tspan class="small" baseline-shift="sub">m</tspan></text>

  <!-- Feedback: position sensor -->
  <rect class="box" x="709" y="272" width="151" height="76"/>
  <text class="boxtext" x="784.5" y="304">Position</text>
  <text class="boxtext" x="784.5" y="333">sensor</text>
  <line class="line" x1="936" y1="309" x2="860" y2="309"/>
  <line class="wire" x1="709" y1="309" x2="124" y2="309"/>
  <line class="line" x1="124" y1="309" x2="124" y2="65"/>
  <text class="math" x="131" y="100">θ<tspan class="small" baseline-shift="sub">m</tspan></text>
</svg>
